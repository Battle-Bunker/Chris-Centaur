<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      padding-top: 60px;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: #2a2a2a; border-bottom: 1px solid #444;
      display: flex; align-items: center; justify-content: center;
      padding: 0 15px; z-index: 1000;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .nav-links { position: absolute; right: 15px; display: flex; gap: 10px; }
    .nav-links a {
      color: #4CAF50; text-decoration: none; font-size: 14px;
      padding: 6px 12px; border-radius: 4px; background: #333;
    }
    .nav-links a:hover { background: #444; }
    .main-content { max-width: 1200px; margin: 0 auto; padding: 20px 15px; }
    .status-bar {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      margin-bottom: 20px;
    }
    .status-text { font-size: 14px; color: #888; }
    .no-games { text-align: center; padding: 60px 20px; color: #666; }
    .no-games h2 { font-size: 24px; margin-bottom: 10px; }
    .no-games p { font-size: 14px; line-height: 1.6; }
    .game-card {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      border: 1px solid #444; cursor: pointer; transition: all 0.2s;
      margin-bottom: 15px;
    }
    .game-card:hover { border-color: #4CAF50; transform: translateY(-2px); }
    .game-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .game-card-team { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
    .team-swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .game-card-time { font-size: 12px; color: #4CAF50; white-space: nowrap; }
    .game-card-id { font-size: 11px; color: #666; word-break: break-all; margin-bottom: 8px; }
    .game-card-meta { font-size: 12px; color: #888; margin-bottom: 10px; }
    .game-card-snakes { display: flex; flex-wrap: wrap; gap: 8px; }
    .snake-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: #333; padding: 4px 10px; border-radius: 12px;
      font-size: 13px; border: 1px solid #555;
    }
    .snake-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .loading { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Game History</h1>
    <div class="nav-links">
      <a href="/play">Play</a>
      <a href="/config">Config</a>
    </div>
  </div>

  <div class="main-content">
    <div class="status-bar">
      <span class="status-text" id="statusText">Loading recorded games...</span>
    </div>
    <div id="gameContainer">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function openGame(gameId) {
      window.location.href = `/game/${encodeURIComponent(gameId)}`;
    }

    async function loadGames() {
      const container = document.getElementById('gameContainer');
      const status = document.getElementById('statusText');
      try {
        const resp = await fetch('/api/logs/games');
        const games = await resp.json();

        if (!Array.isArray(games) || games.length === 0) {
          status.textContent = 'No recorded games yet';
          container.innerHTML =
            '<div class="no-games"><h2>No recorded games</h2>' +
            '<p>Finished games with decision logs will appear here.</p></div>';
          return;
        }

        status.textContent = `${games.length} recorded game${games.length === 1 ? '' : 's'}`;
        container.innerHTML = games.map(renderGameCard).join('');
      } catch (err) {
        console.error('Error loading games:', err);
        status.textContent = 'Failed to load recorded games';
        container.innerHTML =
          '<div class="no-games"><h2>Error</h2><p>Could not load recorded games.</p></div>';
      }
    }

    function renderGameCard(group) {
      const timestamp = group.timestamp
        ? new Date(group.timestamp).toLocaleString()
        : '';
      const teamSwatch = group.team_color
        ? `<span class="team-swatch" style="background-color:${escapeHtml(group.team_color)};"></span>`
        : '';
      const snakeTags = (group.snakes || []).map((s) => {
        const dot = s.color
          ? `<span class="snake-dot" style="background-color:${escapeHtml(s.color)};"></span>`
          : '';
        const len = s.length != null ? ` \u{1F4CF}${s.length}` : '';
        return `<span class="snake-tag">${dot}${escapeHtml(s.snake_name || 'Snake')}${len}</span>`;
      }).join('');

      return `
        <div class="game-card" onclick="openGame('${escapeHtml(group.game_id)}')">
          <div class="game-card-header">
            <span class="game-card-team">${teamSwatch}${escapeHtml(group.team_label || 'Team')}</span>
            ${timestamp ? `<span class="game-card-time">${escapeHtml(timestamp)}</span>` : ''}
          </div>
          <div class="game-card-id">${escapeHtml(group.game_id)}</div>
          <div class="game-card-meta">Turns: ${escapeHtml(group.turns)}</div>
          <div class="game-card-snakes">${snakeTags}</div>
        </div>
      `;
    }

    loadGames();
  </script>
</body>
</html>
