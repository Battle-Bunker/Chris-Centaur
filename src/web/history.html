<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      overflow-x: hidden;
      padding-top: 60px;
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #2a2a2a;
      border-bottom: 1px solid #444;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      z-index: 1000;
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
      text-align: center;
    }
    
    .menu-button {
      background: #444;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .menu-button:hover {
      background: #555;
    }
    
    /* Game List Overlay */
    .game-list-overlay {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 900;
      display: none;
    }
    
    .game-list-overlay.active {
      display: block;
    }
    
    .game-list {
      position: fixed;
      top: 60px;
      left: -100%;
      width: 85%;
      max-width: 350px;
      bottom: 0;
      background: #2a2a2a;
      border-right: 1px solid #444;
      transition: left 0.3s ease;
      z-index: 950;
      overflow-y: auto;
    }
    
    .game-list.active {
      left: 0;
    }
    
    .game-item {
      padding: 15px;
      border-bottom: 1px solid #444;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .game-item:hover {
      background: #333;
    }
    
    .game-item.active {
      background: #3a4a5a;
      border-left: 3px solid #4CAF50;
    }
    
    .game-item-header {
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    
    .game-item-id {
      font-size: 10px;
      color: #888;
      font-weight: normal;
    }
    
    .game-item-details {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }
    
    /* Main Content */
    .main-content {
      padding: 20px 15px;
      max-width: 100%;
      margin: 0 auto;
    }
    
    /* Board Container */
    .board-container {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .turn-info {
      font-size: 16px;
      font-weight: 600;
    }
    
    .health-display {
      font-size: 14px;
      color: #4CAF50;
    }
    
    .canvas-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }
    
    #gameCanvas {
      border: 2px solid #444;
      background: #1a1a1a;
      max-width: 100%;
      height: auto;
    }
    
    /* Snake Info */
    .snake-info-container {
      margin-bottom: 20px;
    }
    
    .snake-info-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    
    .snake-info-item {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .snake-color-box {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 2px solid #444;
      flex-shrink: 0;
    }
    
    .snake-details {
      flex: 1;
      min-width: 0;
    }
    
    .snake-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .snake-stats {
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 8px;
    }
    
    /* Turn Controls */
    .turn-controls {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .turn-slider {
      width: 100%;
      margin: 10px 0;
    }
    
    .control-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    
    .control-buttons button {
      background: #444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .control-buttons button:hover {
      background: #555;
    }
    
    /* Move Selection */
    .move-selection {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .move-selection h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #4CAF50;
    }
    
    .move-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    
    .move-button {
      padding: 10px;
      background: #333;
      color: white;
      border: 2px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      transition: all 0.2s;
    }
    
    .move-button:hover {
      background: #444;
    }
    
    .move-button.selected {
      background: #3a4a5a;
      border-color: #4CAF50;
    }
    
    .move-button.chosen {
      background: #2a5a2a;
      border-color: #4CAF50;
      font-weight: 600;
    }
    
    .move-button .score {
      font-size: 12px;
      color: #888;
      display: block;
      margin-top: 4px;
    }
    
    /* Decision Stats Table */
    .decision-stats {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
    }
    
    .decision-stats h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #4CAF50;
    }
    
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    .stats-table th,
    .stats-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    
    .stats-table th {
      background: #333;
      font-weight: 600;
    }
    
    .stats-table tr:last-child td {
      border-bottom: none;
    }
    
    .stats-table .total-row {
      font-weight: 600;
      background: #333;
    }
    
    /* Loading State */
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    /* Desktop Styles */
    @media (min-width: 768px) {
      .main-content {
        max-width: 1200px;
        padding: 20px;
      }
      
      .game-list {
        width: 320px;
      }
      
      .board-container {
        display: flex;
        gap: 20px;
      }
      
      .board-left {
        flex: 1;
      }
      
      .board-right {
        width: 300px;
      }
      
      #gameCanvas {
        max-width: 500px;
      }
    }
    
    /* Range Slider Styling */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="menu-button" onclick="toggleGameList()">☰</button>
    <h1>Game History</h1>
    <div style="width: 40px;"></div>
  </div>
  
  <div class="game-list-overlay" onclick="closeGameList()"></div>
  <div class="game-list" id="gameList">
    <div class="loading">Loading games...</div>
  </div>
  
  <div class="main-content">
    <div class="board-container">
      <div class="board-left">
        <div class="board-header">
          <div class="turn-info">Turn: <span id="currentTurn">0</span> / <span id="totalTurns">0</span></div>
          <div class="health-display">Health: <span id="healthDisplay">100</span></div>
        </div>
        
        <div class="canvas-wrapper">
          <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
      </div>
    </div>
    
    <div class="snake-info-container">
      <div class="snake-info-list" id="snakeInfoList">
        <!-- Snake info will be populated here -->
      </div>
    </div>
    
    <div class="turn-controls">
      <input type="range" id="turnSlider" class="turn-slider" min="0" max="0" value="0">
      <div class="control-buttons">
        <button onclick="previousTurn()">◀ Previous</button>
        <button onclick="togglePlay()" id="playButton">▶ Play</button>
        <button onclick="nextTurn()">Next ▶</button>
      </div>
    </div>
    
    <div class="move-selection">
      <h3>Move Analysis</h3>
      <div class="move-buttons" id="moveButtons">
        <!-- Move buttons will be populated here -->
      </div>
    </div>
    
    <div class="decision-stats">
      <h3>Decision Breakdown</h3>
      <div id="statsTableContainer">
        <table class="stats-table">
          <thead>
            <tr>
              <th>Component</th>
              <th>Value</th>
              <th>Weight</th>
              <th>Weighted</th>
            </tr>
          </thead>
          <tbody id="statsTableBody">
            <tr>
              <td colspan="4" style="text-align: center; color: #888;">Select a move to see breakdown</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script>
    let currentGame = null;
    let currentTurn = 0;
    let turnData = [];
    let playInterval = null;
    let selectedMove = null;
    
    // Toggle game list
    function toggleGameList() {
      const gameList = document.getElementById('gameList');
      const overlay = document.querySelector('.game-list-overlay');
      gameList.classList.toggle('active');
      overlay.classList.toggle('active');
    }
    
    function closeGameList() {
      const gameList = document.getElementById('gameList');
      const overlay = document.querySelector('.game-list-overlay');
      gameList.classList.remove('active');
      overlay.classList.remove('active');
    }
    
    // Fetch and display games
    async function loadGames() {
      try {
        const response = await fetch('/api/logs/games');
        const games = await response.json();
        
        const gameList = document.getElementById('gameList');
        
        if (games.length === 0) {
          gameList.innerHTML = '<div class="loading">No games recorded yet</div>';
          return;
        }
        
        gameList.innerHTML = games.map(game => {
          const timestamp = game.timestamp ? new Date(game.timestamp).toLocaleString() : 'No timestamp';
          return `
            <div class="game-item" data-game-id="${game.game_id}" data-snake-id="${game.snake_id}" 
                 onclick="loadGame('${game.game_id}', '${game.snake_id}', '${game.snake_name || 'Unknown'}')">
              <div class="game-item-header">
                <span>${game.snake_name || 'Unknown Snake'}</span>
                <span class="game-item-id">${game.snake_id}</span>
              </div>
              <div class="game-item-details">
                Turns: ${game.turns}<br>
                ${timestamp}
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Error loading games:', error);
      }
    }
    
    // Load specific game
    async function loadGame(gameId, snakeId, snakeName) {
      currentGame = gameId;
      closeGameList();
      
      // Update active state
      document.querySelectorAll('.game-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.gameId === gameId && item.dataset.snakeId === snakeId) {
          item.classList.add('active');
        }
      });
      
      try {
        const response = await fetch(`/api/logs?game_id=${gameId}&snake_id=${snakeId}`);
        const data = await response.json();
        
        if (data.decisions && data.decisions.length > 0) {
          turnData = data.decisions;
          currentTurn = 0;
          
          // Update slider
          const slider = document.getElementById('turnSlider');
          slider.max = turnData.length - 1;
          slider.value = 0;
          
          // Update total turns
          document.getElementById('totalTurns').textContent = turnData.length;
          
          // Render first turn
          renderTurn(0);
        }
      } catch (error) {
        console.error('Error loading game:', error);
      }
    }
    
    // Render specific turn
    function renderTurn(turnIndex) {
      if (!turnData || turnIndex < 0 || turnIndex >= turnData.length) return;
      
      const turn = turnData[turnIndex];
      currentTurn = turnIndex;
      
      // Update UI
      document.getElementById('currentTurn').textContent = turn.turn;
      document.getElementById('turnSlider').value = turnIndex;
      document.getElementById('healthDisplay').textContent = turn.health;
      
      // Render board
      renderBoard(turn);
      
      // Render snake info
      renderSnakeInfo(turn);
      
      // Render move buttons
      renderMoveButtons(turn);
      
      // Clear stats table
      selectedMove = null;
      updateStatsTable(null);
    }
    
    // Render the game board
    function renderBoard(turn) {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const gameState = turn.game_state;
      
      if (!gameState || !gameState.board) return;
      
      const board = gameState.board;
      const cellSize = Math.min(canvas.width / board.width, canvas.height / board.height);
      
      // Clear canvas
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= board.width; x++) {
        ctx.beginPath();
        ctx.moveTo(x * cellSize, 0);
        ctx.lineTo(x * cellSize, board.height * cellSize);
        ctx.stroke();
      }
      for (let y = 0; y <= board.height; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * cellSize);
        ctx.lineTo(board.width * cellSize, y * cellSize);
        ctx.stroke();
      }
      
      // Draw food
      ctx.fillStyle = '#ff6b6b';
      board.food.forEach(food => {
        const x = food.x * cellSize;
        const y = (board.height - 1 - food.y) * cellSize;
        ctx.beginPath();
        ctx.arc(x + cellSize/2, y + cellSize/2, cellSize/3, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Draw snakes with connected segments
      board.snakes.forEach(snake => {
        const snakeColor = snake.customizations?.color || snake.color || '#888888';
        
        // Draw body segments as connected path
        if (snake.body.length > 1) {
          ctx.strokeStyle = snakeColor;
          ctx.lineWidth = cellSize * 0.6;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          
          ctx.beginPath();
          for (let i = 0; i < snake.body.length; i++) {
            const segment = snake.body[i];
            const x = segment.x * cellSize + cellSize/2;
            const y = (board.height - 1 - segment.y) * cellSize + cellSize/2;
            
            if (i === 0) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }
          ctx.stroke();
        }
        
        // Draw head
        const head = snake.body[0];
        if (head) {
          const x = head.x * cellSize;
          const y = (board.height - 1 - head.y) * cellSize;
          
          ctx.fillStyle = snakeColor;
          ctx.fillRect(x + cellSize * 0.1, y + cellSize * 0.1, cellSize * 0.8, cellSize * 0.8);
          
          // Add border to head
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.strokeRect(x + cellSize * 0.1, y + cellSize * 0.1, cellSize * 0.8, cellSize * 0.8);
        }
        
        // Highlight our snake
        if (snake.id === turn.snake_id) {
          const head = snake.body[0];
          if (head) {
            const x = head.x * cellSize;
            const y = (board.height - 1 - head.y) * cellSize;
            
            // Draw chosen move arrow
            if (turn.chosen_move) {
              ctx.strokeStyle = '#4CAF50';
              ctx.lineWidth = 3;
              ctx.beginPath();
              
              const centerX = x + cellSize/2;
              const centerY = y + cellSize/2;
              let endX = centerX;
              let endY = centerY;
              
              switch(turn.chosen_move) {
                case 'up': endY -= cellSize * 0.7; break;
                case 'down': endY += cellSize * 0.7; break;
                case 'left': endX -= cellSize * 0.7; break;
                case 'right': endX += cellSize * 0.7; break;
              }
              
              ctx.moveTo(centerX, centerY);
              ctx.lineTo(endX, endY);
              ctx.stroke();
              
              // Draw arrowhead
              const angle = Math.atan2(endY - centerY, endX - centerX);
              ctx.beginPath();
              ctx.moveTo(endX, endY);
              ctx.lineTo(endX - 10 * Math.cos(angle - Math.PI/6), endY - 10 * Math.sin(angle - Math.PI/6));
              ctx.lineTo(endX - 10 * Math.cos(angle + Math.PI/6), endY - 10 * Math.sin(angle + Math.PI/6));
              ctx.closePath();
              ctx.fillStyle = '#4CAF50';
              ctx.fill();
            }
          }
        }
      });
      
      // Draw move scores if available and a move is selected
      if (selectedMove && turn.move_evaluations) {
        const moves = turn.move_evaluations;
        const moveData = moves[selectedMove];
        
        if (moveData && moveData.board_scores) {
          // Find max and min scores for color scaling
          let maxScore = -Infinity;
          let minScore = Infinity;
          
          for (let y = 0; y < board.height; y++) {
            for (let x = 0; x < board.width; x++) {
              const score = moveData.board_scores[y]?.[x];
              if (score !== undefined && score !== null) {
                maxScore = Math.max(maxScore, score);
                minScore = Math.min(minScore, score);
              }
            }
          }
          
          // Draw score overlay
          for (let y = 0; y < board.height; y++) {
            for (let x = 0; x < board.width; x++) {
              const score = moveData.board_scores[y]?.[x];
              if (score !== undefined && score !== null) {
                const normalized = (score - minScore) / (maxScore - minScore) || 0;
                const hue = normalized * 120; // 0 (red) to 120 (green)
                
                ctx.fillStyle = `hsla(${hue}, 70%, 50%, 0.3)`;
                ctx.fillRect(
                  x * cellSize,
                  (board.height - 1 - y) * cellSize,
                  cellSize,
                  cellSize
                );
              }
            }
          }
        }
      }
    }
    
    // Render snake info below board
    function renderSnakeInfo(turn) {
      const container = document.getElementById('snakeInfoList');
      const gameState = turn.game_state;
      
      if (!gameState || !gameState.board) {
        container.innerHTML = '';
        return;
      }
      
      const snakes = gameState.board.snakes;
      container.innerHTML = snakes.map(snake => {
        const isOurSnake = snake.id === turn.snake_id;
        const snakeColor = snake.customizations?.color || snake.color || '#888888';
        return `
          <div class="snake-info-item">
            <div class="snake-color-box" style="background-color: ${snakeColor};"></div>
            <div class="snake-details">
              <div class="snake-name">${snake.name}${isOurSnake ? ' (You)' : ''}</div>
              <div class="snake-stats">
                <span>❤️ ${snake.health}</span>
                <span>📏 ${snake.body.length}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Render move buttons
    function renderMoveButtons(turn) {
      const container = document.getElementById('moveButtons');
      const moves = turn.move_evaluations;
      
      if (!moves) {
        container.innerHTML = '<div style="text-align: center; color: #888;">No move data available</div>';
        return;
      }
      
      const moveOrder = ['up', 'down', 'left', 'right'];
      container.innerHTML = moveOrder.map(direction => {
        const moveData = moves[direction];
        if (!moveData) {
          return `
            <button class="move-button" disabled>
              ${direction.toUpperCase()}
              <span class="score">Not evaluated</span>
            </button>
          `;
        }
        
        const isChosen = direction === turn.chosen_move;
        const isSafe = turn.safe_moves && turn.safe_moves.includes(direction);
        
        return `
          <button class="move-button ${isChosen ? 'chosen' : ''}" 
                  onclick="selectMove('${direction}')"
                  style="${!isSafe ? 'opacity: 0.5;' : ''}">
            ${direction.toUpperCase()} ${isChosen ? '✓' : ''}
            <span class="score">Score: ${moveData.total_score?.toFixed(2) || 'N/A'}</span>
          </button>
        `;
      }).join('');
    }
    
    // Select a move to show details
    function selectMove(direction) {
      selectedMove = direction;
      
      // Update button states
      document.querySelectorAll('.move-button').forEach(btn => {
        btn.classList.remove('selected');
        if (btn.textContent.toLowerCase().includes(direction)) {
          btn.classList.add('selected');
        }
      });
      
      // Update stats table
      const turn = turnData[currentTurn];
      if (turn && turn.move_evaluations && turn.move_evaluations[direction]) {
        updateStatsTable(turn.move_evaluations[direction]);
      }
      
      // Re-render board to show scores
      renderTurn(currentTurn);
    }
    
    // Update stats table
    function updateStatsTable(moveData) {
      const tbody = document.getElementById('statsTableBody');
      
      if (!moveData || !moveData.components) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4" style="text-align: center; color: #888;">Select a move to see breakdown</td>
          </tr>
        `;
        return;
      }
      
      const components = moveData.components;
      let rows = [];
      let totalWeighted = 0;
      
      // Add component rows
      Object.entries(components).forEach(([key, data]) => {
        if (key !== 'total' && data) {
          const weighted = (data.value * data.weight) || 0;
          totalWeighted += weighted;
          
          rows.push(`
            <tr>
              <td>${key.replace(/_/g, ' ')}</td>
              <td>${data.value?.toFixed(3) || '0'}</td>
              <td>${data.weight?.toFixed(2) || '0'}</td>
              <td>${weighted.toFixed(3)}</td>
            </tr>
          `);
        }
      });
      
      // Add total row
      rows.push(`
        <tr class="total-row">
          <td>Total Score</td>
          <td colspan="2">States: ${moveData.states_evaluated || 0}</td>
          <td>${moveData.total_score?.toFixed(3) || totalWeighted.toFixed(3)}</td>
        </tr>
      `);
      
      tbody.innerHTML = rows.join('');
    }
    
    // Navigation controls
    function previousTurn() {
      if (currentTurn > 0) {
        renderTurn(currentTurn - 1);
      }
    }
    
    function nextTurn() {
      if (currentTurn < turnData.length - 1) {
        renderTurn(currentTurn + 1);
      }
    }
    
    function togglePlay() {
      const button = document.getElementById('playButton');
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        button.textContent = '▶ Play';
      } else {
        button.textContent = '⏸ Pause';
        playInterval = setInterval(() => {
          if (currentTurn < turnData.length - 1) {
            renderTurn(currentTurn + 1);
          } else {
            clearInterval(playInterval);
            playInterval = null;
            button.textContent = '▶ Play';
          }
        }, 500);
      }
    }
    
    // Slider control
    document.getElementById('turnSlider').addEventListener('input', (e) => {
      renderTurn(parseInt(e.target.value));
    });
    
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') previousTurn();
      if (e.key === 'ArrowRight') nextTurn();
      if (e.key === ' ') {
        e.preventDefault();
        togglePlay();
      }
    });
    
    // Initialize
    loadGames();
  </script>
</body>
</html>
