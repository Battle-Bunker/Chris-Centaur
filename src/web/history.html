<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      overflow-x: hidden;
      padding-top: 60px;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #2a2a2a;
      border-bottom: 1px solid #444;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      z-index: 1000;
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
      text-align: center;
    }
    
    .menu-button {
      background: #444;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .menu-button:hover {
      background: #555;
    }
    
    .game-list-overlay {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 900;
      display: none;
    }
    
    .game-list-overlay.active {
      display: block;
    }
    
    .game-list {
      position: fixed;
      top: 60px;
      left: -100%;
      width: 85%;
      max-width: 350px;
      bottom: 0;
      background: #2a2a2a;
      border-right: 1px solid #444;
      transition: left 0.3s ease;
      z-index: 950;
      overflow-y: auto;
    }
    
    .game-list.active {
      left: 0;
    }
    
    .game-item {
      padding: 15px;
      border-bottom: 1px solid #444;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .game-item:hover {
      background: #333;
    }
    
    .game-item.active {
      background: #3a4a5a;
      border-left: 3px solid #4CAF50;
    }
    
    .game-item-header {
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    
    .game-item-id {
      font-size: 10px;
      color: #888;
      font-weight: normal;
    }
    
    .game-item-details {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }
    
    .main-content {
      padding: 20px 15px;
      max-width: 100%;
      margin: 0 auto;
    }
    
    .board-container {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .turn-info {
      font-size: 16px;
      font-weight: 600;
    }
    
    .health-display {
      font-size: 14px;
      color: #4CAF50;
    }
    
    .canvas-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
      position: relative;
    }
    
    #gameCanvas {
      border: 2px solid #888;
      background: #ffffff;
      max-width: 100%;
      height: auto;
    }
    
    #boardOverlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    
    .cell-button {
      position: absolute;
      background: transparent;
      border: none;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s;
    }
    
    .cell-button:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .snake-info-container {
      margin-bottom: 20px;
    }
    
    .snake-info-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    
    .snake-info-item {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .snake-color-box {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 2px solid #444;
      flex-shrink: 0;
    }
    
    .snake-details {
      flex: 1;
      min-width: 0;
    }
    
    .snake-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .snake-stats {
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 8px;
    }

    .member-list {
      margin-bottom: 6px;
    }

    .member-line {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ccc;
      font-size: 12px;
      line-height: 1.5;
    }

    .member-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 3px;
      border: 1px solid #555;
      flex-shrink: 0;
    }

    .team-group {
      margin-bottom: 14px;
    }

    .team-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 4px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #444;
    }

    .team-group-header.our-team {
      color: #4CAF50;
    }

    .team-group-header.enemy-team {
      color: #e57373;
    }

    .team-group-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid #555;
      flex-shrink: 0;
    }

    .team-group.our-team .snake-info-item {
      margin-bottom: 6px;
    }

    .snake-info-item.selectable {
      transition: background 0.15s, border-color 0.15s;
    }

    .snake-info-item.selectable:hover {
      background: #333;
    }

    .snake-info-item.active-perspective {
      background: #3a4a5a;
      outline: 2px solid #4CAF50;
    }
    
    .turn-controls {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .turn-slider {
      width: 100%;
      margin: 10px 0;
    }
    
    .control-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    
    .control-buttons button {
      background: #444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .control-buttons button:hover {
      background: #555;
    }
    
    .move-selection {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .move-selection h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #4CAF50;
    }
    
    .move-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      max-width: 300px;
      margin: 0 auto;
    }
    
    .move-button {
      padding: 10px;
      background: #333;
      color: white;
      border: 2px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      transition: all 0.2s;
    }
    
    .move-button:hover:not(:disabled) {
      background: #444;
    }
    
    .move-button.selected {
      background: rgba(156, 39, 176, 0.2) !important;
      border: 5px solid #9C27B0 !important;
      box-shadow: 0 0 15px rgba(156, 39, 176, 0.8), inset 0 0 10px rgba(156, 39, 176, 0.3) !important;
      z-index: 10;
      position: relative;
    }
    
    .move-button.chosen {
      background: #2a5a2a;
      border-color: #4CAF50;
      font-weight: 600;
    }
    
    .move-button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .move-button.not-evaluated {
      background: #2a2a2a;
      color: #666;
    }
    
    .move-button .score {
      font-size: 12px;
      color: #aaa;
      display: block;
      margin-top: 4px;
    }
    
    .decision-stats {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
    }
    
    .decision-stats h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #4CAF50;
    }
    
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    .stats-table th,
    .stats-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    
    .stats-table th {
      background: #333;
      font-weight: 600;
    }
    
    .stats-table tr:last-child td {
      border-bottom: none;
    }
    
    .stats-table .total-row {
      font-weight: 600;
      background: #333;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    @media (min-width: 768px) {
      .main-content {
        max-width: 1200px;
        padding: 20px;
      }
      
      .game-list {
        width: 320px;
      }
      
      .board-container {
        display: flex;
        gap: 20px;
      }
      
      .board-left {
        flex: 1;
      }
      
      .board-right {
        width: 300px;
      }
      
      #gameCanvas {
        max-width: 600px;
      }
    }
    
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="menu-button" onclick="toggleGameList()">☰</button>
    <h1>Game History</h1>
    <div style="width: 40px;"></div>
  </div>
  
  <div class="game-list-overlay" onclick="closeGameList()"></div>
  <div class="game-list" id="gameList">
    <div class="loading">Loading games...</div>
  </div>
  
  <div class="main-content">
    <div class="board-container">
      <div class="board-left">
        <div class="board-header">
          <div class="turn-info">Turn: <span id="currentTurn">0</span> / <span id="totalTurns">0</span></div>
          <div class="health-display">Health: <span id="healthDisplay">100</span></div>
        </div>
        
        <div class="canvas-wrapper">
          <canvas id="gameCanvas" width="550" height="550"></canvas>
          <div id="boardOverlay"></div>
        </div>
      </div>
    </div>
    
    <div class="snake-info-container">
      <div class="snake-info-list" id="snakeInfoList"></div>
    </div>
    
    <div class="turn-controls">
      <input type="range" id="turnSlider" class="turn-slider" min="0" max="0" value="0">
      <div class="control-buttons">
        <button onclick="previousTurn()">◀ Previous</button>
        <button onclick="togglePlay()" id="playButton">▶ Play</button>
        <button onclick="nextTurn()">Next ▶</button>
        <button onclick="copyMoveJson()" id="copyJsonButton">📋 Copy /move JSON</button>
      </div>
    </div>
    
    <div class="move-selection">
      <h3>Move Analysis</h3>
      <div class="move-buttons" id="moveButtons"></div>
    </div>
    
    <div class="decision-stats">
      <h3>Decision Breakdown</h3>
      <div id="statsTableContainer">
        <table class="stats-table">
          <thead>
            <tr>
              <th>Component</th>
              <th>Value</th>
              <th>Weight</th>
              <th>Weighted</th>
              <th>Impact</th>
            </tr>
          </thead>
          <tbody id="statsTableBody">
            <tr>
              <td colspan="5" style="text-align: center; color: #888;">Select a move to see breakdown</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script src="/board-renderer.js"></script>
  <script>
    let currentGame = null;
    let currentTurn = 0;
    let turnData = [];
    let playInterval = null;
    let gameGroups = [];
    let currentGroupIndex = -1;
    let currentSnakeId = null;
    let moveState = {
      selectedMove: null,
      moves: {},
      safeMoves: [],
      territoryCells: {},
      selectedSnake: null
    };
    
    function toggleGameList() {
      document.getElementById('gameList').classList.toggle('active');
      document.querySelector('.game-list-overlay').classList.toggle('active');
    }
    
    function closeGameList() {
      document.getElementById('gameList').classList.remove('active');
      document.querySelector('.game-list-overlay').classList.remove('active');
    }
    
    async function loadGames(autoLoadMostRecent = true) {
      try {
        const response = await fetch('/api/logs/games');
        const games = await response.json();
        gameGroups = games;
        const gameList = document.getElementById('gameList');
        
        if (games.length === 0) {
          gameList.innerHTML = '<div class="loading">No games recorded yet</div>';
          return;
        }
        
        gameList.innerHTML = games.map((group, idx) => {
          const timestamp = group.timestamp ? new Date(group.timestamp).toLocaleString() : 'No timestamp';
          const members = (group.snakes || []).map(s => {
            const dot = s.color
              ? `<span class="member-dot" style="background-color:${s.color};"></span>`
              : '';
            return `<div class="member-line">${dot}${s.snake_name}${s.length != null ? ` <span style="color:#888;">(\u{1F4CF}${s.length})</span>` : ''}</div>`;
          }).join('');
          const swatch = group.team_color
            ? `<span class="member-dot" style="background-color:${group.team_color};"></span>`
            : '';
          return `
            <div class="game-item" data-group-index="${idx}"
                 onclick="loadGroup(${idx})">
              <div class="game-item-header">
                <span>${swatch}${group.team_label || 'Team'}</span>
              </div>
              <div class="game-item-details">
                <div class="member-list">${members}</div>
                <span style="font-size: 0.85em; color: #888;">Game: ${group.game_id}</span><br>
                Turns: ${group.turns}<br>
                ${timestamp}
              </div>
            </div>
          `;
        }).join('');
        
        if (autoLoadMostRecent && games.length > 0) {
          loadGroup(0);
        }
      } catch (error) {
        console.error('Error loading games:', error);
      }
    }
    
    function loadGroup(index) {
      const group = gameGroups[index];
      if (!group) return;
      currentGroupIndex = index;

      document.querySelectorAll('.game-item').forEach(item => {
        item.classList.toggle('active', parseInt(item.dataset.groupIndex, 10) === index);
      });

      loadGame(group.game_id, group.default_snake_id);
    }

    // Per-(game,snake) decision cache so switching perspective doesn't re-fetch
    // the whole game over the network on every click (the source of the lag).
    const decisionCache = new Map();

    async function fetchDecisionsCached(gameId, snakeId) {
      const key = `${gameId}::${snakeId}`;
      if (decisionCache.has(key)) return decisionCache.get(key);
      const response = await fetch(`/api/logs?game_id=${encodeURIComponent(gameId)}&snake_id=${encodeURIComponent(snakeId)}`);
      const data = await response.json();
      const decisions = (data && data.decisions) || [];
      decisionCache.set(key, decisions);
      return decisions;
    }

    // Warm the cache for our teammates in the background so selecting another of
    // our snakes is instant instead of paying a network round-trip per click.
    function prefetchTeamDecisions(gameId) {
      if (!turnData || !turnData.length) return;
      const board = turnData[Math.max(0, currentTurn)]?.game_state?.board;
      if (!board) return;
      const ourKey = BoardRenderer.getTeamKey(board.snakes.find(s => s.id === currentSnakeId));
      for (const s of board.snakes) {
        if (BoardRenderer.getTeamKey(s) !== ourKey) continue;
        if (decisionCache.has(`${gameId}::${s.id}`)) continue;
        fetchDecisionsCached(gameId, s.id).catch(() => {});
      }
    }

    async function loadGame(gameId, snakeId, preserveTurn = false) {
      currentGame = gameId;
      currentSnakeId = snakeId;
      closeGameList();

      const desiredTurn = preserveTurn ? currentTurn : 0;

      try {
        const decisions = await fetchDecisionsCached(gameId, snakeId);

        if (decisions && decisions.length > 0) {
          turnData = decisions;
          const slider = document.getElementById('turnSlider');
          slider.max = turnData.length - 1;
          const startTurn = Math.min(desiredTurn, turnData.length - 1);
          slider.value = startTurn;
          document.getElementById('totalTurns').textContent = turnData.length;
          renderTurn(startTurn);
          prefetchTeamDecisions(gameId);
        }
      } catch (error) {
        console.error('Error loading game:', error);
      }
    }

    // Switch the perspective ("you") snake within the currently loaded game,
    // keeping the current turn so the board, breakdown and arrows just re-point
    // to the selected teammate's logged decisions.
    function selectPerspectiveSnake(snakeId) {
      if (!currentGame || snakeId === currentSnakeId) return;
      loadGame(currentGame, snakeId, true);
    }
    
    function handleCanvasClick(event) {
      if (!turnData || currentTurn < 0 || currentTurn >= turnData.length) return;
      const turn = turnData[currentTurn];
      const canvas = document.getElementById('gameCanvas');
      const rect = canvas.getBoundingClientRect();
      const board = turn.game_state.board;
      const cellSize = Math.min(canvas.width / board.width, canvas.height / board.height);
      const clickX = event.clientX - rect.left;
      const clickY = event.clientY - rect.top;
      const boardX = Math.floor(clickX / cellSize);
      const boardY = board.height - 1 - Math.floor(clickY / cellSize);

      // Click one of our team's snakes to switch the inspected perspective to it
      // (mirrors selecting it from the team list, just from the board directly).
      const ourKey = BoardRenderer.getTeamKey(board.snakes.find(s => s.id === currentSnakeId));
      for (const snake of board.snakes) {
        if (snake.id === currentSnakeId) continue;
        if (BoardRenderer.getTeamKey(snake) !== ourKey) continue;
        if (snake.body.some(seg => seg.x === boardX && seg.y === boardY)) {
          selectPerspectiveSnake(snake.id);
          return;
        }
      }

      let clickedSnake = null;
      for (const [snakeId, cells] of Object.entries(moveState.territoryCells)) {
        if (cells && cells.some(c => c.x === boardX && c.y === boardY)) {
          clickedSnake = snakeId;
          break;
        }
      }
      
      if (clickedSnake) {
        moveState.selectedSnake = (moveState.selectedSnake === clickedSnake) ? null : clickedSnake;
        renderBoardView(turn);
      } else if (moveState.selectedSnake) {
        moveState.selectedSnake = null;
        renderBoardView(turn);
      }
    }
    
    function renderTurn(turnIndex) {
      if (!turnData || turnIndex < 0 || turnIndex >= turnData.length) return;
      const turn = turnData[turnIndex];
      currentTurn = turnIndex;
      
      moveState = BoardRenderer.processMoveEvaluations(
        turn.move_evaluations, turn.safe_moves, turn.game_state.you.head, turn.chosen_move
      );
      
      document.getElementById('currentTurn').textContent = turn.turn;
      document.getElementById('turnSlider').value = turnIndex;
      document.getElementById('healthDisplay').textContent = turn.health;
      
      renderBoardView(turn);
      BoardRenderer.renderSnakeInfo(
        document.getElementById('snakeInfoList'), turn.game_state, turn.snake_id, null,
        { groupByTeam: true, onSelectSnake: selectPerspectiveSnake }
      );
      BoardRenderer.renderMoveButtons(document.getElementById('moveButtons'), moveState, selectMove);
      
      moveState.selectedMove = null;
      moveState.selectedSnake = null;
      BoardRenderer.updateStatsTable(document.getElementById('statsTableBody'), null, moveState);
    }
    
    function applyMove(head, move) {
      switch (move) {
        case 'up': return { x: head.x, y: head.y + 1 };
        case 'down': return { x: head.x, y: head.y - 1 };
        case 'left': return { x: head.x - 1, y: head.y };
        case 'right': return { x: head.x + 1, y: head.y };
      }
      return null;
    }

    function buildOurDeaths(turn) {
      // Our own snake's death markers only render on the final logged turn, the
      // one the engine tagged with server_outcome on game end. Shadow = the move
      // we intended (head + chosen_move); solid = where the server actually put
      // us. Older logs have no server_outcome → no markers (rendered gracefully).
      const outcome = turn.server_outcome;
      if (!outcome || outcome.alive) return [];
      const snakes = turn.game_state?.board?.snakes || [];
      const ourSnake = snakes.find(s => s.id === turn.snake_id) || turn.game_state?.you;
      const head = ourSnake?.body?.[0] || ourSnake?.head;
      const intendedHead = head && turn.chosen_move ? applyMove(head, turn.chosen_move) : null;
      const actualHead =
        outcome.finalHeadX != null && outcome.finalHeadY != null
          ? { x: outcome.finalHeadX, y: outcome.finalHeadY }
          : null;
      return [{
        id: turn.snake_id,
        lastHead: head || null,
        intendedHead,
        actualHead,
        color: ourSnake?.customizations?.color || ourSnake?.color || '#888888',
        emoji: ourSnake?.emoji || '\u{1F40D}',
      }];
    }

    function renderBoardView(turn) {
      const canvas = document.getElementById('gameCanvas');
      const prevTurn = currentTurn > 0 ? turnData[currentTurn - 1] : null;
      BoardRenderer.renderBoard(canvas, turn.game_state, moveState, {
        snakeId: turn.snake_id,
        chosenMove: turn.chosen_move,
        showChosenArrow: true,
        previousBoard: prevTurn?.game_state?.board || null,
        ourDeaths: buildOurDeaths(turn),
        interactive: false
      });
      BoardRenderer.createBoardOverlay(
        document.getElementById('boardOverlay'), canvas, turn.game_state.board, moveState, selectMove
      );
    }
    
    function selectMove(direction) {
      moveState.selectedMove = direction;
      const turn = turnData[currentTurn];
      BoardRenderer.renderMoveButtons(document.getElementById('moveButtons'), moveState, selectMove);
      renderBoardView(turn);
      const move = moveState.moves[direction];
      if (move) {
        BoardRenderer.updateStatsTable(document.getElementById('statsTableBody'), move, moveState);
      }
    }
    
    function previousTurn() {
      if (currentTurn > 0) renderTurn(currentTurn - 1);
    }
    
    function nextTurn() {
      if (currentTurn < turnData.length - 1) renderTurn(currentTurn + 1);
    }

    let copyJsonTimeout = null;
    const COPY_JSON_LABEL = '📋 Copy /move JSON';

    function copyMoveJson() {
      const turn = turnData[currentTurn];
      if (!turn || !turn.game_state) return;
      const btn = document.getElementById('copyJsonButton');
      const json = JSON.stringify(turn.game_state, null, 2);
      if (copyJsonTimeout) clearTimeout(copyJsonTimeout);
      navigator.clipboard.writeText(json).then(() => {
        btn.textContent = '✅ Copied!';
      }).catch(() => {
        btn.textContent = '❌ Failed';
      }).finally(() => {
        copyJsonTimeout = setTimeout(() => { btn.textContent = COPY_JSON_LABEL; }, 1500);
      });
    }
    
    function togglePlay() {
      const button = document.getElementById('playButton');
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        button.textContent = '▶ Play';
      } else {
        button.textContent = '⏸ Pause';
        playInterval = setInterval(() => {
          if (currentTurn < turnData.length - 1) {
            renderTurn(currentTurn + 1);
          } else {
            clearInterval(playInterval);
            playInterval = null;
            button.textContent = '▶ Play';
          }
        }, 500);
      }
    }
    
    document.getElementById('turnSlider').addEventListener('input', (e) => {
      renderTurn(parseInt(e.target.value));
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') previousTurn();
      if (e.key === 'ArrowRight') nextTurn();
      if (e.key === ' ') {
        e.preventDefault();
        togglePlay();
      }
    });
    
    document.getElementById('gameCanvas').addEventListener('click', handleCanvasClick);
    
    loadGames();
  </script>
</body>
</html>
