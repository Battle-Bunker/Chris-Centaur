<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game History</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      overflow-x: hidden;
      padding-top: 60px;
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #2a2a2a;
      border-bottom: 1px solid #444;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      z-index: 1000;
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
      text-align: center;
    }
    
    .menu-button {
      background: #444;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    
    .menu-button:hover {
      background: #555;
    }
    
    /* Game List Overlay */
    .game-list-overlay {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 900;
      display: none;
    }
    
    .game-list-overlay.active {
      display: block;
    }
    
    .game-list {
      position: fixed;
      top: 60px;
      left: -100%;
      width: 85%;
      max-width: 350px;
      bottom: 0;
      background: #2a2a2a;
      border-right: 1px solid #444;
      transition: left 0.3s ease;
      z-index: 950;
      overflow-y: auto;
    }
    
    .game-list.active {
      left: 0;
    }
    
    .game-item {
      padding: 15px;
      border-bottom: 1px solid #444;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .game-item:hover {
      background: #333;
    }
    
    .game-item.active {
      background: #3a4a5a;
      border-left: 3px solid #4CAF50;
    }
    
    .game-item-header {
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    
    .game-item-id {
      font-size: 10px;
      color: #888;
      font-weight: normal;
    }
    
    .game-item-details {
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }
    
    /* Main Content */
    .main-content {
      padding: 20px 15px;
      max-width: 100%;
      margin: 0 auto;
    }
    
    /* Board Container */
    .board-container {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .turn-info {
      font-size: 16px;
      font-weight: 600;
    }
    
    .health-display {
      font-size: 14px;
      color: #4CAF50;
    }
    
    .canvas-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
      position: relative;
    }
    
    #gameCanvas {
      border: 2px solid #444;
      background: #1a1a1a;
      max-width: 100%;
      height: auto;
    }
    
    /* Clickable overlay for board cells */
    #boardOverlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    
    .cell-button {
      position: absolute;
      background: transparent;
      border: none; /* No borders - use background color only */
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s;
    }
    
    .cell-button:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    /* Snake Info */
    .snake-info-container {
      margin-bottom: 20px;
    }
    
    .snake-info-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    
    .snake-info-item {
      background: #2a2a2a;
      border-radius: 6px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .snake-color-box {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 2px solid #444;
      flex-shrink: 0;
    }
    
    .snake-details {
      flex: 1;
      min-width: 0;
    }
    
    .snake-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .snake-stats {
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 8px;
    }
    
    /* Turn Controls */
    .turn-controls {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .turn-slider {
      width: 100%;
      margin: 10px 0;
    }
    
    .control-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    
    .control-buttons button {
      background: #444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .control-buttons button:hover {
      background: #555;
    }
    
    /* Move Selection */
    .move-selection {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .move-selection h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #4CAF50;
    }
    
    .move-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      max-width: 300px;
      margin: 0 auto;
    }
    
    .move-button {
      padding: 10px;
      background: #333;
      color: white;
      border: 2px solid #444;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      transition: all 0.2s;
    }
    
    .move-button:hover:not(:disabled) {
      background: #444;
    }
    
    .move-button.selected {
      background: rgba(156, 39, 176, 0.2) !important; /* Purple tinted background */
      border: 5px solid #9C27B0 !important; /* Thicker purple border for selection */
      box-shadow: 0 0 15px rgba(156, 39, 176, 0.8), inset 0 0 10px rgba(156, 39, 176, 0.3) !important; /* Enhanced glow */
      z-index: 10;
      position: relative;
    }
    
    .move-button.chosen {
      background: #2a5a2a;
      border-color: #4CAF50;
      font-weight: 600;
    }
    
    .move-button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .move-button.not-evaluated {
      background: #2a2a2a;
      color: #666;
    }
    
    /* Color coding for move attractiveness - removed, using dynamic colors */
    /* Quality classes now use dynamic HSL colors from getScoreColor */
    
    .move-button .score {
      font-size: 12px;
      color: #aaa;
      display: block;
      margin-top: 4px;
    }
    
    /* Decision Stats Table */
    .decision-stats {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
    }
    
    .decision-stats h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #4CAF50;
    }
    
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    .stats-table th,
    .stats-table td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    
    .stats-table th {
      background: #333;
      font-weight: 600;
    }
    
    .stats-table tr:last-child td {
      border-bottom: none;
    }
    
    .stats-table .total-row {
      font-weight: 600;
      background: #333;
    }
    
    /* Loading State */
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    /* Desktop Styles */
    @media (min-width: 768px) {
      .main-content {
        max-width: 1200px;
        padding: 20px;
      }
      
      .game-list {
        width: 320px;
      }
      
      .board-container {
        display: flex;
        gap: 20px;
      }
      
      .board-left {
        flex: 1;
      }
      
      .board-right {
        width: 300px;
      }
      
      #gameCanvas {
        max-width: 500px;
      }
    }
    
    /* Range Slider Styling */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #444;
      outline: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="menu-button" onclick="toggleGameList()">☰</button>
    <h1>Game History</h1>
    <div style="width: 40px;"></div>
  </div>
  
  <div class="game-list-overlay" onclick="closeGameList()"></div>
  <div class="game-list" id="gameList">
    <div class="loading">Loading games...</div>
  </div>
  
  <div class="main-content">
    <div class="board-container">
      <div class="board-left">
        <div class="board-header">
          <div class="turn-info">Turn: <span id="currentTurn">0</span> / <span id="totalTurns">0</span></div>
          <div class="health-display">Health: <span id="healthDisplay">100</span></div>
        </div>
        
        <div class="canvas-wrapper">
          <canvas id="gameCanvas" width="400" height="400"></canvas>
          <div id="boardOverlay"></div>
        </div>
      </div>
    </div>
    
    <div class="snake-info-container">
      <div class="snake-info-list" id="snakeInfoList">
        <!-- Snake info will be populated here -->
      </div>
    </div>
    
    <div class="turn-controls">
      <input type="range" id="turnSlider" class="turn-slider" min="0" max="0" value="0">
      <div class="control-buttons">
        <button onclick="previousTurn()">◀ Previous</button>
        <button onclick="togglePlay()" id="playButton">▶ Play</button>
        <button onclick="nextTurn()">Next ▶</button>
      </div>
    </div>
    
    <div class="move-selection">
      <h3>Move Analysis</h3>
      <div class="move-buttons" id="moveButtons">
        <!-- Move buttons will be populated here -->
      </div>
    </div>
    
    <div class="decision-stats">
      <h3>Decision Breakdown</h3>
      <div id="statsTableContainer">
        <table class="stats-table">
          <thead>
            <tr>
              <th>Component</th>
              <th>Value</th>
              <th>Weight</th>
              <th>Weighted</th>
              <th>Impact</th>
            </tr>
          </thead>
          <tbody id="statsTableBody">
            <tr>
              <td colspan="5" style="text-align: center; color: #888;">Select a move to see breakdown</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script>
    // Global state
    let currentGame = null;
    let currentTurn = 0;
    let turnData = [];
    let playInterval = null;
    
    // Shared state for move selection
    // Unified move state tracking
    let moveState = {
      selectedMove: null,
      moves: {}, // Single source of truth for all move data
      safeMoves: []
    };
    
    // Toggle game list
    function toggleGameList() {
      const gameList = document.getElementById('gameList');
      const overlay = document.querySelector('.game-list-overlay');
      gameList.classList.toggle('active');
      overlay.classList.toggle('active');
    }
    
    function closeGameList() {
      const gameList = document.getElementById('gameList');
      const overlay = document.querySelector('.game-list-overlay');
      gameList.classList.remove('active');
      overlay.classList.remove('active');
    }
    
    // Fetch and display games
    async function loadGames(autoLoadMostRecent = true) {
      try {
        const response = await fetch('/api/logs/games');
        const games = await response.json();
        
        const gameList = document.getElementById('gameList');
        
        if (games.length === 0) {
          gameList.innerHTML = '<div class="loading">No games recorded yet</div>';
          return;
        }
        
        gameList.innerHTML = games.map(game => {
          const timestamp = game.timestamp ? new Date(game.timestamp).toLocaleString() : 'No timestamp';
          return `
            <div class="game-item" data-game-id="${game.game_id}" data-snake-id="${game.snake_id}" 
                 onclick="loadGame('${game.game_id}', '${game.snake_id}', '${game.snake_name || 'Unknown'}')">
              <div class="game-item-header">
                <span>${game.snake_name || 'Unknown Snake'}</span>
                <span class="game-item-id">${game.snake_id}</span>
              </div>
              <div class="game-item-details">
                Turns: ${game.turns}<br>
                ${timestamp}
              </div>
            </div>
          `;
        }).join('');
        
        // Automatically load the most recent game if requested
        if (autoLoadMostRecent && games.length > 0) {
          const mostRecent = games[0]; // Games are already sorted by timestamp DESC
          loadGame(mostRecent.game_id, mostRecent.snake_id, mostRecent.snake_name || 'Unknown');
        }
      } catch (error) {
        console.error('Error loading games:', error);
      }
    }
    
    // Load specific game
    async function loadGame(gameId, snakeId, snakeName) {
      currentGame = gameId;
      closeGameList();
      
      // Update active state
      document.querySelectorAll('.game-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.gameId === gameId && item.dataset.snakeId === snakeId) {
          item.classList.add('active');
        }
      });
      
      try {
        const response = await fetch(`/api/logs?game_id=${gameId}&snake_id=${snakeId}`);
        const data = await response.json();
        
        if (data.decisions && data.decisions.length > 0) {
          turnData = data.decisions;
          currentTurn = 0;
          
          // Update slider
          const slider = document.getElementById('turnSlider');
          slider.max = turnData.length - 1;
          slider.value = 0;
          
          // Update total turns
          document.getElementById('totalTurns').textContent = turnData.length;
          
          // Render first turn
          renderTurn(0);
        }
      } catch (error) {
        console.error('Error loading game:', error);
      }
    }
    
    // Process and unify all move data in a single state
    function processMoveEvaluations(turn) {
      moveState.moves = {};
      moveState.safeMoves = turn.safe_moves || [];
      
      const head = turn.game_state.you.head;
      const directions = ['up', 'down', 'left', 'right'];
      const evaluationsMap = {};
      
      // First, map evaluations by direction
      if (turn.move_evaluations && Array.isArray(turn.move_evaluations)) {
        turn.move_evaluations.forEach(evalData => {
          evaluationsMap[evalData.move] = evalData;
        });
      }
      
      // Build unified move data for all directions
      directions.forEach(direction => {
        let candidatePos = null;
        switch(direction) {
          case 'up': candidatePos = {x: head.x, y: head.y + 1}; break;
          case 'down': candidatePos = {x: head.x, y: head.y - 1}; break;
          case 'left': candidatePos = {x: head.x - 1, y: head.y}; break;
          case 'right': candidatePos = {x: head.x + 1, y: head.y}; break;
        }
        
        const isSafe = moveState.safeMoves.includes(direction);
        const evalData = evaluationsMap[direction];
        
        // Create unified move data
        moveState.moves[direction] = {
          direction: direction,
          position: candidatePos,
          positionKey: candidatePos ? `${candidatePos.x},${candidatePos.y}` : null,
          isSafe: isSafe,
          isChosen: direction === turn.chosen_move,
          isEvaluated: !!evalData,
          score: evalData?.score ?? null,
          breakdown: evalData?.breakdown ?? null,
          numStates: evalData?.numStates ?? null,
          // For safe moves without evaluation, use a minimal score
          // This ensures they're still visible/selectable
          displayScore: evalData?.score ?? (isSafe ? 0 : null),
          quality: null, // Will be calculated after all moves are processed
          color: null // Will be calculated after all moves are processed
        };
      });
      
      // Calculate quality and colors based on scores
      const scoredMoves = Object.values(moveState.moves)
        .filter(m => m.displayScore != null);
      const allScores = scoredMoves.map(m => m.displayScore);
      
      // Assign quality and color to each move
      Object.values(moveState.moves).forEach(move => {
        if (move.displayScore != null && allScores.length > 0) {
          move.quality = getMoveQuality(move.displayScore, allScores);
          move.color = getScoreColor(move.displayScore, allScores);
        } else {
          move.quality = 'not-evaluated';
          move.color = 'rgba(100, 100, 100, 0.3)';
        }
      });
    }
    
    // Get move quality class based on score
    function getMoveQuality(score, allScores) {
      if (score == null || allScores.length === 0) return 'not-evaluated';
      
      const maxScore = Math.max(...allScores);
      const minScore = Math.min(...allScores);
      const range = maxScore - minScore;
      
      if (range === 0) return 'neutral';
      
      const normalized = (score - minScore) / range;
      
      if (normalized >= 0.8) return 'best';
      if (normalized >= 0.5) return 'good';
      if (normalized >= 0.2) return 'neutral';
      return 'bad';
    }
    
    // Get color for score - using red to green spectrum via orange and yellow
    function getScoreColor(score, allScores) {
      if (score == null || allScores.length === 0) return 'rgba(100, 100, 100, 0.3)';
      
      const maxScore = Math.max(...allScores);
      const minScore = Math.min(...allScores);
      const range = maxScore - minScore;
      
      // Special case: single evaluated move or no range
      if (range === 0 || allScores.length === 1) {
        // For single move, use yellow/green based on absolute score
        const hue = score > 0 ? 90 : (score < 0 ? 0 : 60);
        return `hsla(${hue}, 70%, 50%, 0.3)`;
      }
      
      const normalized = (score - minScore) / range;
      const hue = normalized * 120; // 0 (red) to 120 (green)
      
      return `hsla(${hue}, 70%, 50%, 0.3)`;
    }
    
    // Render specific turn
    function renderTurn(turnIndex) {
      if (!turnData || turnIndex < 0 || turnIndex >= turnData.length) return;
      
      const turn = turnData[turnIndex];
      currentTurn = turnIndex;
      
      // Process move evaluations into shared state
      processMoveEvaluations(turn);
      
      // Update UI
      document.getElementById('currentTurn').textContent = turn.turn;
      document.getElementById('turnSlider').value = turnIndex;
      document.getElementById('healthDisplay').textContent = turn.health;
      
      // Render board
      renderBoard(turn);
      
      // Render snake info
      renderSnakeInfo(turn);
      
      // Render move buttons
      renderMoveButtons(turn);
      
      // Clear stats table
      moveState.selectedMove = null;
      updateStatsTable(null);
    }
    
    // Render the game board
    function renderBoard(turn) {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const gameState = turn.game_state;
      
      if (!gameState || !gameState.board) return;
      
      const board = gameState.board;
      const cellSize = Math.min(canvas.width / board.width, canvas.height / board.height);
      
      // Clear canvas
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= board.width; x++) {
        ctx.beginPath();
        ctx.moveTo(x * cellSize, 0);
        ctx.lineTo(x * cellSize, board.height * cellSize);
        ctx.stroke();
      }
      for (let y = 0; y <= board.height; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * cellSize);
        ctx.lineTo(board.width * cellSize, y * cellSize);
        ctx.stroke();
      }
      
      // Draw hazards (sauce/lava zones)
      if (board.hazards && board.hazards.length > 0) {
        board.hazards.forEach(hazard => {
          const x = hazard.x * cellSize;
          const y = (board.height - 1 - hazard.y) * cellSize;
          
          // Draw hazard background (dark red/brown)
          ctx.fillStyle = 'rgba(139, 69, 19, 0.6)';
          ctx.fillRect(x, y, cellSize, cellSize);
          
          // Clip to cell bounds
          ctx.save();
          ctx.beginPath();
          ctx.rect(x, y, cellSize, cellSize);
          ctx.clip();
          ctx.restore();
        });
      }
      
      // Draw candidate cells with unified color coding
      Object.values(moveState.moves).forEach(move => {
        if (move.position && (move.isSafe || move.isEvaluated)) {
          const x = move.position.x * cellSize;
          const y = (board.height - 1 - move.position.y) * cellSize;
          
          // Use the pre-calculated color from unified state
          ctx.fillStyle = move.color;
          ctx.fillRect(x, y, cellSize, cellSize);
          
          // Purple outline for selected move (distinct from green quality)
          if (moveState.selectedMove === move.direction) {
            ctx.strokeStyle = '#9C27B0'; // Purple
            ctx.lineWidth = 3;
            ctx.strokeRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
          }
        }
      })
      
      // Draw food
      ctx.fillStyle = '#ff6b6b';
      board.food.forEach(food => {
        const x = food.x * cellSize;
        const y = (board.height - 1 - food.y) * cellSize;
        ctx.beginPath();
        ctx.arc(x + cellSize/2, y + cellSize/2, cellSize/3, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // Draw snakes with connected segments
      board.snakes.forEach(snake => {
        const snakeColor = snake.customizations?.color || snake.color || '#888888';
        
        // Draw body segments as connected path
        if (snake.body.length > 1) {
          ctx.strokeStyle = snakeColor;
          ctx.lineWidth = cellSize * 0.6;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          
          ctx.beginPath();
          for (let i = 0; i < snake.body.length; i++) {
            const segment = snake.body[i];
            const x = segment.x * cellSize + cellSize/2;
            const y = (board.height - 1 - segment.y) * cellSize + cellSize/2;
            
            if (i === 0) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }
          ctx.stroke();
        }
        
        // Draw head
        const head = snake.body[0];
        if (head) {
          const x = head.x * cellSize;
          const y = (board.height - 1 - head.y) * cellSize;
          
          ctx.fillStyle = snakeColor;
          ctx.fillRect(x + cellSize * 0.1, y + cellSize * 0.1, cellSize * 0.8, cellSize * 0.8);
          
          // Add border to head
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.strokeRect(x + cellSize * 0.1, y + cellSize * 0.1, cellSize * 0.8, cellSize * 0.8);
        }
        
        // Highlight our snake
        if (snake.id === turn.snake_id) {
          const head = snake.body[0];
          if (head) {
            const x = head.x * cellSize;
            const y = (board.height - 1 - head.y) * cellSize;
            
            // Draw chosen move arrow
            if (turn.chosen_move) {
              ctx.strokeStyle = '#4CAF50';
              ctx.lineWidth = 3;
              ctx.beginPath();
              
              const centerX = x + cellSize/2;
              const centerY = y + cellSize/2;
              let endX = centerX;
              let endY = centerY;
              
              switch(turn.chosen_move) {
                case 'up': endY -= cellSize * 0.7; break;
                case 'down': endY += cellSize * 0.7; break;
                case 'left': endX -= cellSize * 0.7; break;
                case 'right': endX += cellSize * 0.7; break;
              }
              
              ctx.moveTo(centerX, centerY);
              ctx.lineTo(endX, endY);
              ctx.stroke();
              
              // Draw arrowhead
              const angle = Math.atan2(endY - centerY, endX - centerX);
              ctx.beginPath();
              ctx.moveTo(endX, endY);
              ctx.lineTo(endX - 10 * Math.cos(angle - Math.PI/6), endY - 10 * Math.sin(angle - Math.PI/6));
              ctx.lineTo(endX - 10 * Math.cos(angle + Math.PI/6), endY - 10 * Math.sin(angle + Math.PI/6));
              ctx.closePath();
              ctx.fillStyle = '#4CAF50';
              ctx.fill();
            }
          }
        }
      });
      
      // Create clickable overlay for candidate cells
      createBoardOverlay(board, cellSize);
    }
    
    // Create clickable overlay for board cells using unified state
    function createBoardOverlay(board, cellSize) {
      const overlay = document.getElementById('boardOverlay');
      const canvas = document.getElementById('gameCanvas');
      
      overlay.innerHTML = '';
      
      // Use client dimensions for responsive layouts
      const displayWidth = canvas.clientWidth || canvas.width;
      const displayHeight = canvas.clientHeight || canvas.height;
      overlay.style.width = displayWidth + 'px';
      overlay.style.height = displayHeight + 'px';
      
      // Calculate display cell size based on actual display dimensions
      const displayCellSize = Math.min(displayWidth / board.width, displayHeight / board.height);
      
      // Create buttons from unified move state
      Object.values(moveState.moves).forEach(move => {
        if (!move.position || (!move.isSafe && !move.isEvaluated)) return;
        
        const button = document.createElement('button');
        button.className = 'cell-button';
        
        if (move.isSafe) {
          button.className += ' candidate';
        }
        
        if (moveState.selectedMove === move.direction) {
          button.className += ' selected';
        }
        
        // Use display cell size for positioning
        const x = move.position.x * displayCellSize;
        const y = (board.height - 1 - move.position.y) * displayCellSize;
        
        button.style.left = x + 'px';
        button.style.top = y + 'px';
        button.style.width = displayCellSize + 'px';
        button.style.height = displayCellSize + 'px';
        
        // Only allow clicking safe or evaluated moves
        if (move.isSafe || move.isEvaluated) {
          button.onclick = () => selectMove(move.direction);
          const scoreText = move.score != null ? move.score.toFixed(2) : (move.isSafe ? '0.00' : 'N/A');
          button.title = `${move.direction.toUpperCase()} - Score: ${scoreText}`;
        } else {
          button.style.cursor = 'not-allowed';
          button.style.opacity = '0.3';
          button.title = `${move.direction.toUpperCase()} - UNSAFE`;
        }
        
        overlay.appendChild(button);
      });
    }
    
    // Render snake info below board
    function renderSnakeInfo(turn) {
      const container = document.getElementById('snakeInfoList');
      const gameState = turn.game_state;
      
      if (!gameState || !gameState.board) {
        container.innerHTML = '';
        return;
      }
      
      const snakes = gameState.board.snakes;
      container.innerHTML = snakes.map(snake => {
        const isOurSnake = snake.id === turn.snake_id;
        const snakeColor = snake.customizations?.color || snake.color || '#888888';
        return `
          <div class="snake-info-item">
            <div class="snake-color-box" style="background-color: ${snakeColor};"></div>
            <div class="snake-details">
              <div class="snake-name">${snake.name}${isOurSnake ? ' (You)' : ''}</div>
              <div class="snake-stats">
                <span>❤️ ${snake.health}</span>
                <span>📏 ${snake.body.length}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Render move buttons using unified state with keyboard layout
    function renderMoveButtons(turn) {
      const container = document.getElementById('moveButtons');
      
      // Keyboard-style layout: up on top row middle, left/down/right on bottom
      const buttonLayout = [
        null, 'up', null,    // Top row
        'left', 'down', 'right'  // Bottom row
      ];
      
      container.innerHTML = buttonLayout.map(direction => {
        if (!direction) {
          return '<div style="grid-column: span 1;"></div>'; // Empty spacer
        }
        
        const move = moveState.moves[direction];
        if (!move) return '';
        
        let classes = ['move-button'];
        if (move.isChosen) classes.push('chosen');
        if (moveState.selectedMove === direction) classes.push('selected');
        
        const canInteract = move.isSafe || move.isEvaluated;
        const scoreText = move.score != null ? 
          `Score: ${move.score.toFixed(2)}` : 
          (move.isSafe ? 'Score: 0.00' : 'Not evaluated');
        
        // Use the same color calculation as cells
        const bgColor = move.color || 'rgba(100, 100, 100, 0.3)';
        const solidColor = bgColor.replace('0.3)', '0.8)'); // More opaque for buttons
        
        return `
          <button class="${classes.join(' ')}" 
                  ${canInteract ? `onclick="selectMove('${direction}')"` : 'disabled'}
                  style="background: ${solidColor}; ${!canInteract ? 'cursor: not-allowed;' : ''}">
            ${direction.toUpperCase()} ${move.isChosen ? '✓' : ''}
            <span class="score">${scoreText}</span>
          </button>
        `;
      }).join('');
    }
    
    // Select a move to show details
    function selectMove(direction) {
      moveState.selectedMove = direction;
      
      // Re-render to update visuals
      renderMoveButtons(turnData[currentTurn]);
      renderBoard(turnData[currentTurn]);
      
      // Update stats table
      const move = moveState.moves[direction];
      if (move) {
        updateStatsTable(move);
      }
    }
    
    // Update stats table
    function updateStatsTable(move) {
      const tbody = document.getElementById('statsTableBody');
      
      if (!move || !move.breakdown) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align: center; color: #888;">Select a move to see breakdown</td>
          </tr>
        `;
        return;
      }
      
      const breakdown = move.breakdown;
      
      // Calculate averages across all candidate moves for marginal impact
      const candidateMoves = Object.values(moveState.moves).filter(m => m.isEvaluated || m.isSafe);
      const averageWeighted = {};
      
      if (candidateMoves.length > 0) {
        // Initialize sums
        const weightedSums = {
          myLengthScore: 0,
          myTerritoryScore: 0,
          myControlledFoodScore: 0,
          teamLengthScore: 0,
          teamTerritoryScore: 0,
          teamControlledFoodScore: 0,
          foodProximityScore: 0,
          foodEatenScore: 0,
          enemyTerritoryScore: 0,
          enemyLengthScore: 0,
          edgePenaltyScore: 0,
          selfEnoughSpaceScore: 0,
          alliesEnoughSpaceScore: 0,
          opponentsEnoughSpaceScore: 0,
          killsScore: 0,
          deathsScore: 0,
          fertileScore: 0
        };
        
        // Sum up weighted scores across candidate moves
        candidateMoves.forEach(candidateMove => {
          if (candidateMove.breakdown?.weighted) {
            const weighted = candidateMove.breakdown.weighted;
            weightedSums.myLengthScore += weighted.myLengthScore ?? 0;
            weightedSums.myTerritoryScore += weighted.myTerritoryScore ?? 0;
            weightedSums.myControlledFoodScore += weighted.myControlledFoodScore ?? 0;
            weightedSums.teamLengthScore += weighted.teamLengthScore ?? 0;
            weightedSums.teamTerritoryScore += weighted.teamTerritoryScore ?? 0;
            weightedSums.teamControlledFoodScore += weighted.teamControlledFoodScore ?? 0;
            weightedSums.foodProximityScore += weighted.foodProximityScore ?? 0;
            weightedSums.foodEatenScore += weighted.foodEatenScore ?? 0;
            weightedSums.enemyTerritoryScore += weighted.enemyTerritoryScore ?? 0;
            weightedSums.enemyLengthScore += weighted.enemyLengthScore ?? 0;
            weightedSums.edgePenaltyScore += weighted.edgePenaltyScore ?? 0;
            weightedSums.selfEnoughSpaceScore += weighted.selfEnoughSpaceScore ?? 0;
            weightedSums.alliesEnoughSpaceScore += weighted.alliesEnoughSpaceScore ?? 0;
            weightedSums.opponentsEnoughSpaceScore += weighted.opponentsEnoughSpaceScore ?? 0;
            weightedSums.killsScore += weighted.killsScore ?? 0;
            weightedSums.deathsScore += weighted.deathsScore ?? 0;
            weightedSums.fertileScore += weighted.fertileScore ?? 0;
          }
        });
        
        // Calculate averages
        const count = candidateMoves.length;
        for (const key in weightedSums) {
          averageWeighted[key] = weightedSums[key] / count;
        }
      }
      
      // Helper function to format numeric values to 2 decimal places
      function formatValue(value) {
        if (typeof value === 'number') {
          // For integer-like values (length, territory counts), show without decimals if whole
          if (Number.isInteger(value)) {
            return value.toString();
          }
          // For decimal values, show up to 2 decimal places
          return value.toFixed(2);
        }
        return value;
      }
      
      // Define all metrics with their values, weights, weighted scores, and marginal impact
      const metricsConfig = [
        // My Snake stats
        {
          name: 'My Length',
          value: breakdown.myLength ?? 0,
          weight: breakdown.weights?.myLength ?? 10,
          weightedScore: breakdown.weighted?.myLengthScore ?? 0,
          averageWeighted: averageWeighted.myLengthScore ?? 0
        },
        {
          name: 'My Territory',
          value: breakdown.myTerritory ?? 0,
          weight: breakdown.weights?.myTerritory ?? 1,
          weightedScore: breakdown.weighted?.myTerritoryScore ?? 0,
          averageWeighted: averageWeighted.myTerritoryScore ?? 0
        },
        {
          name: 'My Controlled Food',
          value: breakdown.myControlledFood ?? breakdown.myFoodCount ?? 0,
          weight: breakdown.weights?.myControlledFood ?? 10,
          weightedScore: breakdown.weighted?.myControlledFoodScore ?? 0,
          averageWeighted: averageWeighted.myControlledFoodScore ?? 0
        },
        // Team stats
        {
          name: 'Team Length',
          value: breakdown.teamLength ?? 0,
          weight: breakdown.weights?.teamLength ?? 10,
          weightedScore: breakdown.weighted?.teamLengthScore ?? 0,
          averageWeighted: averageWeighted.teamLengthScore ?? 0
        },
        {
          name: 'Team Territory',
          value: breakdown.teamTerritory ?? 0,
          weight: breakdown.weights?.teamTerritory ?? 1,
          weightedScore: breakdown.weighted?.teamTerritoryScore ?? 0,
          averageWeighted: averageWeighted.teamTerritoryScore ?? 0
        },
        {
          name: 'Team Controlled Food',
          value: breakdown.teamControlledFood ?? breakdown.teamFoodCount ?? 0,
          weight: breakdown.weights?.teamControlledFood ?? 10,
          weightedScore: breakdown.weighted?.teamControlledFoodScore ?? 0,
          averageWeighted: averageWeighted.teamControlledFoodScore ?? 0
        },
        // Distance and proximity
        {
          name: 'Food Distance',
          value: breakdown.foodDistance ?? 'N/A',
          weight: 0,  // Raw distance is not weighted
          weightedScore: 0,
          averageWeighted: 0
        },
        {
          name: 'Food Proximity',
          value: breakdown.foodProximity ?? breakdown.foodDistanceInverse ?? 0,
          weight: breakdown.weights?.foodProximity ?? 50,
          weightedScore: breakdown.weighted?.foodProximityScore ?? 0,
          averageWeighted: averageWeighted.foodProximityScore ?? 0
        },
        {
          name: 'Food Eaten',
          value: breakdown.foodEaten ?? 0,
          weight: breakdown.weights?.foodEaten ?? 200,
          weightedScore: breakdown.weighted?.foodEatenScore ?? 0,
          averageWeighted: averageWeighted.foodEatenScore ?? 0
        },
        // Enemy stats
        {
          name: 'Enemy Territory',
          value: breakdown.enemyTerritory ?? 0,
          weight: breakdown.weights?.enemyTerritory ?? 0,
          weightedScore: breakdown.weighted?.enemyTerritoryScore ?? 0,
          averageWeighted: averageWeighted.enemyTerritoryScore ?? 0
        },
        {
          name: 'Enemy Length',
          value: breakdown.enemyLength ?? 0,
          weight: breakdown.weights?.enemyLength ?? 0,
          weightedScore: breakdown.weighted?.enemyLengthScore ?? 0,
          averageWeighted: averageWeighted.enemyLengthScore ?? 0
        },
        // Safety metrics
        {
          name: 'Edge Penalty',
          value: breakdown.edgePenalty ?? (breakdown.stats?.edgePenalty ?? 0),
          weight: breakdown.weights?.edgePenalty ?? 50,
          weightedScore: breakdown.weighted?.edgePenaltyScore ?? 0,
          averageWeighted: averageWeighted.edgePenaltyScore ?? 0
        },
        // Enhanced Space Detection
        {
          name: 'Self Space',
          value: breakdown.selfEnoughSpace ?? (breakdown.stats?.selfEnoughSpace ?? 0),
          weight: breakdown.weights?.selfEnoughSpace ?? 10,
          weightedScore: breakdown.weighted?.selfEnoughSpaceScore ?? 0,
          averageWeighted: averageWeighted.selfEnoughSpaceScore ?? 0
        },
        {
          name: 'Allies Space',
          value: breakdown.alliesEnoughSpace ?? (breakdown.stats?.alliesEnoughSpace ?? 0),
          weight: breakdown.weights?.alliesEnoughSpace ?? 5,
          weightedScore: breakdown.weighted?.alliesEnoughSpaceScore ?? 0,
          averageWeighted: averageWeighted.alliesEnoughSpaceScore ?? 0
        },
        {
          name: 'Opponents Space',
          value: breakdown.opponentsEnoughSpace ?? (breakdown.stats?.opponentsEnoughSpace ?? 0),
          weight: breakdown.weights?.opponentsEnoughSpace ?? -5,
          weightedScore: breakdown.weighted?.opponentsEnoughSpaceScore ?? 0,
          averageWeighted: averageWeighted.opponentsEnoughSpaceScore ?? 0
        },
        // Life/death
        {
          name: 'Kills',
          value: breakdown.kills ?? 0,
          weight: breakdown.weights?.kills ?? 0,
          weightedScore: breakdown.weighted?.killsScore ?? 0,
          averageWeighted: averageWeighted.killsScore ?? 0
        },
        {
          name: 'Deaths',
          value: breakdown.deaths ?? 0,
          weight: breakdown.weights?.deaths ?? 0,
          weightedScore: breakdown.weighted?.deathsScore ?? 0,
          averageWeighted: averageWeighted.deathsScore ?? 0
        },
        // Legacy compatibility - only show if present and new fields aren't
        ...(breakdown.fertileTerritory !== undefined && !breakdown.myTerritory ? [{
          name: 'Fertile Territory',
          value: breakdown.fertileTerritory ?? 0,
          weight: breakdown.weights?.fertileTerritory ?? 1,
          weightedScore: breakdown.weighted?.fertileScore ?? 0,
          averageWeighted: averageWeighted.fertileScore ?? 0
        }] : [])
      ];
      
      // Calculate marginal impact for each metric
      metricsConfig.forEach(metric => {
        metric.marginalImpact = metric.weightedScore - metric.averageWeighted;
      });
      
      // Sort by absolute marginal impact descending
      metricsConfig.sort((a, b) => Math.abs(b.marginalImpact) - Math.abs(a.marginalImpact));
      
      // Build rows
      let rows = metricsConfig.map(metric => {
        const weightDisplay = metric.weight !== 0 ? metric.weight : '';
        const scoreDisplay = metric.weight !== 0 ? metric.weightedScore.toFixed(2) : '';
        const impactDisplay = metric.weight !== 0 ? 
          (metric.marginalImpact >= 0 ? '+' : '') + metric.marginalImpact.toFixed(2) : '';
        
        // Color code the impact based on its value
        let impactColor = '#888';
        if (metric.marginalImpact > 0) {
          impactColor = '#4CAF50'; // Green for positive
        } else if (metric.marginalImpact < 0) {
          impactColor = '#f44336'; // Red for negative
        }
        
        return `
          <tr>
            <td>${metric.name}</td>
            <td>${formatValue(metric.value)}</td>
            <td>${weightDisplay}</td>
            <td>${scoreDisplay}</td>
            <td style="color: ${impactColor}; font-weight: 600;">${impactDisplay}</td>
          </tr>
        `;
      });
      
      // Add total row
      const totalMarginalImpact = move.score - (candidateMoves.reduce((sum, m) => sum + (m.score ?? 0), 0) / candidateMoves.length);
      rows.push(`
        <tr class="total-row">
          <td>Total Score</td>
          <td colspan="2">States: ${move.numStates || 1}</td>
          <td>${(move.score ?? 0).toFixed(2)}</td>
          <td style="color: ${totalMarginalImpact >= 0 ? '#4CAF50' : '#f44336'}; font-weight: 600;">
            ${totalMarginalImpact >= 0 ? '+' : ''}${totalMarginalImpact.toFixed(2)}
          </td>
        </tr>
      `);
      
      tbody.innerHTML = rows.join('');
    }
    
    // Navigation controls
    function previousTurn() {
      if (currentTurn > 0) {
        renderTurn(currentTurn - 1);
      }
    }
    
    function nextTurn() {
      if (currentTurn < turnData.length - 1) {
        renderTurn(currentTurn + 1);
      }
    }
    
    function togglePlay() {
      const button = document.getElementById('playButton');
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        button.textContent = '▶ Play';
      } else {
        button.textContent = '⏸ Pause';
        playInterval = setInterval(() => {
          if (currentTurn < turnData.length - 1) {
            renderTurn(currentTurn + 1);
          } else {
            clearInterval(playInterval);
            playInterval = null;
            button.textContent = '▶ Play';
          }
        }, 500);
      }
    }
    
    // Slider control
    document.getElementById('turnSlider').addEventListener('input', (e) => {
      renderTurn(parseInt(e.target.value));
    });
    
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') previousTurn();
      if (e.key === 'ArrowRight') nextTurn();
      if (e.key === ' ') {
        e.preventDefault();
        togglePlay();
      }
    });
    
    // Initialize
    loadGames();
  </script>
</body>
</html>
