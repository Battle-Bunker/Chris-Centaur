<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centaur Play - Active Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      padding-top: 60px;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: #2a2a2a; border-bottom: 1px solid #444;
      display: flex; align-items: center; justify-content: center;
      padding: 0 15px; z-index: 1000;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .nav-links { position: absolute; right: 15px; display: flex; gap: 10px; }
    .nav-links a {
      color: #4CAF50; text-decoration: none; font-size: 14px;
      padding: 6px 12px; border-radius: 4px; background: #333;
    }
    .nav-links a:hover { background: #444; }
    .main-content {
      max-width: 1200px; margin: 0 auto; padding: 20px 15px;
    }
    .status-bar {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
    }
    .status-text { font-size: 14px; color: #888; }
    .ws-status {
      font-size: 11px; padding: 3px 8px; border-radius: 10px;
      font-weight: 600;
    }
    .ws-status.connected { background: #2e7d32; color: #c8e6c9; }
    .ws-status.disconnected { background: #c62828; color: #ffcdd2; }
    .ws-status.connecting { background: #e65100; color: #ffe0b2; }
    .no-games {
      text-align: center; padding: 60px 20px; color: #666;
    }
    .no-games h2 { font-size: 24px; margin-bottom: 10px; }
    .no-games p { font-size: 14px; line-height: 1.6; }
    .game-group {
      margin-bottom: 24px;
    }
    .game-group-header {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid #333;
    }
    .game-group-id {
      font-size: 11px; color: #666; word-break: break-all;
    }
    .game-group-time {
      font-size: 12px; color: #4CAF50; white-space: nowrap;
    }
    .game-card-start-time {
      font-size: 11px; color: #4CAF50; white-space: nowrap;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }
    .game-card {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      border: 1px solid #444; cursor: pointer; transition: all 0.2s;
    }
    .game-card:hover { border-color: #4CAF50; transform: translateY(-2px); }
    .game-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .game-card-title { font-weight: 600; font-size: 15px; }
    .game-card-turn { font-size: 12px; color: #888; }
    .game-card-ids {
      font-size: 11px; color: #666; margin-bottom: 10px;
      word-break: break-all; line-height: 1.4;
    }
    .game-card-canvas {
      width: 100%; aspect-ratio: 1; border: 1px solid #444;
      border-radius: 4px; background: #ffffff;
    }
    .override-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .override-badge.active { background: #2e7d32; color: #c8e6c9; }
    .override-badge.inactive { background: #444; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Centaur Play</h1>
    <div class="nav-links">
      <a href="/history">History</a>
      <a href="/config">Config</a>
    </div>
  </div>

  <div class="main-content">
    <div class="status-bar">
      <span class="status-text" id="statusText">Connecting...</span>
      <span class="ws-status connecting" id="wsStatus">Connecting</span>
    </div>

    <div id="gameContainer">
      <div class="no-games">
        <h2>Connecting...</h2>
        <p>Waiting for WebSocket connection to server.</p>
      </div>
    </div>
  </div>

  <script src="/board-renderer.js"></script>
  <script>
    let ws = null;
    let reconnectTimer = null;
    let currentGames = [];

    function connectWebSocket() {
      const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProtocol}//${location.host}/ws`;

      const statusEl = document.getElementById('wsStatus');
      statusEl.textContent = 'Connecting';
      statusEl.className = 'ws-status connecting';

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'ws-status connected';
        ws.send(JSON.stringify({ type: 'subscribe-lobby' }));
        if (reconnectTimer) {
          clearInterval(reconnectTimer);
          reconnectTimer = null;
        }
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'lobby-update') {
            currentGames = msg.games;
            renderGames(msg.games);
          }
        } catch (e) {
          console.error('WS message parse error:', e);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'ws-status disconnected';
        scheduleReconnect();
      };

      ws.onerror = () => {
        statusEl.textContent = 'Error';
        statusEl.className = 'ws-status disconnected';
      };
    }

    function scheduleReconnect() {
      if (!reconnectTimer) {
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connectWebSocket();
        }, 2000);
      }
    }

    function formatStartTime(ts) {
      if (!ts) return '';
      return 'Started ' + new Intl.DateTimeFormat(undefined, {
        month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
      }).format(new Date(ts));
    }

    function renderGames(games) {
      const container = document.getElementById('gameContainer');
      const statusText = document.getElementById('statusText');

      if (games.length === 0) {
        container.innerHTML = `
          <div class="no-games">
            <h2>No Active Games</h2>
            <p>Start a game on the Battlesnake platform to see it here.<br>
            Games will appear automatically when the bot receives move requests.</p>
          </div>`;
        statusText.textContent = 'No active games';
        return;
      }

      statusText.textContent = `${games.length} active game${games.length > 1 ? 's' : ''}`;

      const groupMap = new Map();
      for (const game of games) {
        if (!groupMap.has(game.gameId)) {
          groupMap.set(game.gameId, { startedAt: game.startedAt, entries: [] });
        }
        const group = groupMap.get(game.gameId);
        if (game.startedAt && game.startedAt < group.startedAt) {
          group.startedAt = game.startedAt;
        }
        group.entries.push(game);
      }

      const groups = Array.from(groupMap.values());
      groups.sort((a, b) => (b.startedAt || 0) - (a.startedAt || 0));

      let html = '';
      for (const group of groups) {
        const startLabel = formatStartTime(group.startedAt);
        html += `<div class="game-group">`;
        html += `<div class="game-group-header">`;
        html += `<span class="game-group-id">${group.entries[0].gameId}</span>`;
        if (startLabel) {
          html += `<span class="game-group-time">${startLabel}</span>`;
        }
        html += `</div>`;
        html += `<div class="game-grid">`;
        for (const game of group.entries) {
          html += `
        <div class="game-card" onclick="openGame('${game.gameId}', '${game.snakeId}')">
          <div class="game-card-header">
            <span class="game-card-title">${game.snakeEmoji || '\u{1F40D}'} ${game.snakeName || 'Snake'}</span>
            <span class="game-card-turn">Turn ${game.turn}</span>
          </div>
          <div class="game-card-ids">
            <span style="font-size: 0.85em; color: #888;">Snake: ${game.snakeId}</span><br>
            Game: ${game.gameId}
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span class="override-badge ${game.overrideEnabled ? 'active' : 'inactive'}">
              ${game.overrideEnabled ? 'Override ON' : 'Auto'}
            </span>
            ${startLabel ? `<span class="game-card-start-time">${startLabel}</span>` : ''}
          </div>
          <canvas class="game-card-canvas" id="minimap-${game.gameId}-${game.snakeId}" width="200" height="200"></canvas>
        </div>`;
        }
        html += `</div></div>`;
      }
      container.innerHTML = html;

      requestAnimationFrame(() => {
        games.forEach(game => {
          if (game.gameState) {
            const canvas = document.getElementById(`minimap-${game.gameId}-${game.snakeId}`);
            if (canvas) {
              canvas.width = canvas.clientWidth;
              canvas.height = canvas.clientHeight;
              BoardRenderer.renderMinimap(canvas, game.gameState, game.snakeId);
            }
          }
        });
      });
    }

    function openGame(gameId, snakeId) {
      window.location.href = `/play/${gameId}/${snakeId}`;
    }

    connectWebSocket();
  </script>
</body>
</html>
