<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centaur Play - Active Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      padding-top: 60px;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: #2a2a2a; border-bottom: 1px solid #444;
      display: flex; align-items: center; justify-content: center;
      padding: 0 15px; z-index: 1000;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .nav-links { position: absolute; right: 15px; display: flex; gap: 10px; }
    .nav-links a {
      color: #4CAF50; text-decoration: none; font-size: 14px;
      padding: 6px 12px; border-radius: 4px; background: #333;
    }
    .nav-links a:hover { background: #444; }
    .main-content {
      max-width: 1200px; margin: 0 auto; padding: 20px 15px;
    }
    .status-bar {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
    }
    .status-text { font-size: 14px; color: #888; }
    .refresh-btn {
      background: #444; color: white; border: none;
      padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .refresh-btn:hover { background: #555; }
    .no-games {
      text-align: center; padding: 60px 20px; color: #666;
    }
    .no-games h2 { font-size: 24px; margin-bottom: 10px; }
    .no-games p { font-size: 14px; line-height: 1.6; }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }
    .game-card {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      border: 1px solid #444; cursor: pointer; transition: all 0.2s;
    }
    .game-card:hover { border-color: #4CAF50; transform: translateY(-2px); }
    .game-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .game-card-title { font-weight: 600; font-size: 15px; }
    .game-card-turn { font-size: 12px; color: #888; }
    .game-card-ids {
      font-size: 11px; color: #666; margin-bottom: 10px;
      word-break: break-all; line-height: 1.4;
    }
    .game-card-canvas {
      width: 100%; aspect-ratio: 1; border: 1px solid #444;
      border-radius: 4px; background: #1a1a1a;
    }
    .override-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .override-badge.active { background: #2e7d32; color: #c8e6c9; }
    .override-badge.inactive { background: #444; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Centaur Play</h1>
    <div class="nav-links">
      <a href="/history">History</a>
      <a href="/config">Config</a>
    </div>
  </div>

  <div class="main-content">
    <div class="status-bar">
      <span class="status-text" id="statusText">Loading...</span>
      <button class="refresh-btn" onclick="loadGames()">Refresh</button>
    </div>

    <div id="gameContainer">
      <div class="no-games">
        <h2>No Active Games</h2>
        <p>Start a game on the Battlesnake platform to see it here.<br>
        Games will appear automatically when the bot receives move requests.</p>
      </div>
    </div>
  </div>

  <script src="/board-renderer.js"></script>
  <script>
    let refreshTimer = null;

    async function loadGames() {
      try {
        const response = await fetch('/api/play/games');
        const games = await response.json();
        const container = document.getElementById('gameContainer');
        const statusText = document.getElementById('statusText');

        if (games.length === 0) {
          container.innerHTML = `
            <div class="no-games">
              <h2>No Active Games</h2>
              <p>Start a game on the Battlesnake platform to see it here.<br>
              Games will appear automatically when the bot receives move requests.</p>
            </div>`;
          statusText.textContent = 'No active games';
          return;
        }

        statusText.textContent = `${games.length} active game${games.length > 1 ? 's' : ''}`;

        container.innerHTML = '<div class="game-grid">' + games.map(game => `
          <div class="game-card" onclick="openGame('${game.gameId}', '${game.snakeId}')">
            <div class="game-card-header">
              <span class="game-card-title">${game.snakeName || 'Snake'}</span>
              <span class="game-card-turn">Turn ${game.turn}</span>
            </div>
            <div class="game-card-ids">
              Game: ${game.gameId}<br>
              Snake: ${game.snakeId}
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
              <span class="override-badge ${game.overrideEnabled ? 'active' : 'inactive'}">
                ${game.overrideEnabled ? 'Override ON' : 'Auto'}
              </span>
            </div>
            <canvas class="game-card-canvas" id="minimap-${game.gameId}-${game.snakeId}" width="200" height="200"></canvas>
          </div>
        `).join('') + '</div>';

        requestAnimationFrame(() => {
          games.forEach(game => {
            if (game.gameState) {
              const canvas = document.getElementById(`minimap-${game.gameId}-${game.snakeId}`);
              if (canvas) {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                BoardRenderer.renderMinimap(canvas, game.gameState, game.snakeId);
              }
            }
          });
        });
      } catch (error) {
        console.error('Error loading games:', error);
        document.getElementById('statusText').textContent = 'Error loading games';
      }
    }

    function openGame(gameId, snakeId) {
      window.location.href = `/play/${gameId}/${snakeId}`;
    }

    loadGames();
    refreshTimer = setInterval(loadGames, 3000);
  </script>
</body>
</html>
