<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centaur Play - Active Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #1a1a1a;
      color: #e0e0e0;
      padding-top: 60px;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: #2a2a2a; border-bottom: 1px solid #444;
      display: flex; align-items: center; justify-content: center;
      padding: 0 15px; z-index: 1000;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .nav-links { position: absolute; right: 15px; display: flex; gap: 10px; }
    .nav-links a {
      color: #4CAF50; text-decoration: none; font-size: 14px;
      padding: 6px 12px; border-radius: 4px; background: #333;
    }
    .nav-links a:hover { background: #444; }
    .main-content {
      max-width: 1200px; margin: 0 auto; padding: 20px 15px;
    }
    .status-bar {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
    }
    .status-text { font-size: 14px; color: #888; }
    .ws-status {
      font-size: 11px; padding: 3px 8px; border-radius: 10px;
      font-weight: 600;
    }
    .ws-status.connected { background: #2e7d32; color: #c8e6c9; }
    .ws-status.disconnected { background: #c62828; color: #ffcdd2; }
    .ws-status.connecting { background: #e65100; color: #ffe0b2; }
    .no-games {
      text-align: center; padding: 60px 20px; color: #666;
    }
    .no-games h2 { font-size: 24px; margin-bottom: 10px; }
    .no-games p { font-size: 14px; line-height: 1.6; }
    .game-card {
      background: #2a2a2a; border-radius: 8px; padding: 15px;
      border: 1px solid #444; cursor: pointer; transition: all 0.2s;
      margin-bottom: 15px; display: flex; gap: 15px; align-items: stretch;
    }
    .game-card:hover { border-color: #4CAF50; transform: translateY(-2px); }
    .game-card-info { flex: 1; min-width: 0; }
    .game-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .game-card-id {
      font-size: 11px; color: #666; word-break: break-all;
      margin-bottom: 8px;
    }
    .game-card-time {
      font-size: 12px; color: #4CAF50; white-space: nowrap;
    }
    .game-card-turn { font-size: 12px; color: #888; }
    .game-card-snakes {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .controlled-snake-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: #333; padding: 4px 10px; border-radius: 12px;
      font-size: 13px; border: 1px solid #555;
    }
    .game-card-minimap {
      width: 150px; min-width: 150px; flex-shrink: 0;
    }
    .game-card-canvas {
      width: 100%; aspect-ratio: 1; border: 1px solid #444;
      border-radius: 4px; background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Centaur Play</h1>
    <div class="nav-links">
      <a href="/history">History</a>
      <a href="/config">Config</a>
    </div>
  </div>

  <div class="main-content">
    <div class="status-bar">
      <span class="status-text" id="statusText">Connecting...</span>
      <span class="ws-status connecting" id="wsStatus">Connecting</span>
    </div>

    <div id="gameContainer">
      <div class="no-games">
        <h2>Connecting...</h2>
        <p>Waiting for WebSocket connection to server.</p>
      </div>
    </div>
  </div>

  <script src="/board-renderer.js"></script>
  <script>
    let ws = null;
    let reconnectTimer = null;
    let currentGames = [];

    function connectWebSocket() {
      const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProtocol}//${location.host}/ws`;

      const statusEl = document.getElementById('wsStatus');
      statusEl.textContent = 'Connecting';
      statusEl.className = 'ws-status connecting';

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'ws-status connected';
        ws.send(JSON.stringify({ type: 'subscribe-lobby' }));
        if (reconnectTimer) {
          clearInterval(reconnectTimer);
          reconnectTimer = null;
        }
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'lobby-update') {
            currentGames = msg.games;
            renderGames(msg.games);
          }
        } catch (e) {
          console.error('WS message parse error:', e);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'ws-status disconnected';
        scheduleReconnect();
      };

      ws.onerror = () => {
        statusEl.textContent = 'Error';
        statusEl.className = 'ws-status disconnected';
      };
    }

    function scheduleReconnect() {
      if (!reconnectTimer) {
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          connectWebSocket();
        }, 2000);
      }
    }

    function formatStartTime(ts) {
      if (!ts) return '';
      return 'Started ' + new Intl.DateTimeFormat(undefined, {
        month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
      }).format(new Date(ts));
    }

    function renderGames(games) {
      const container = document.getElementById('gameContainer');
      const statusText = document.getElementById('statusText');

      if (games.length === 0) {
        container.innerHTML = `
          <div class="no-games">
            <h2>No Active Games</h2>
            <p>Start a game on the Battlesnake platform to see it here.<br>
            Games will appear automatically when the bot receives move requests.</p>
          </div>`;
        statusText.textContent = 'No active games';
        return;
      }

      statusText.textContent = `${games.length} active game${games.length > 1 ? 's' : ''}`;

      const sorted = [...games].sort((a, b) => (b.startedAt || 0) - (a.startedAt || 0));

      let html = '';
      for (const game of sorted) {
        const startLabel = formatStartTime(game.startedAt);
        const snakeTags = (game.controlledSnakes || []).map(s =>
          `<span class="controlled-snake-tag">${s.emoji || '\u{1F40D}'} ${s.name || 'Snake'}</span>`
        ).join('');

        html += `
        <div class="game-card" onclick="openGame('${game.gameId}')">
          <div class="game-card-info">
            <div class="game-card-header">
              <span class="game-card-turn">Turn ${game.turn}</span>
              ${startLabel ? `<span class="game-card-time">${startLabel}</span>` : ''}
            </div>
            <div class="game-card-id">${game.gameId}</div>
            <div class="game-card-snakes">${snakeTags}</div>
          </div>
          <div class="game-card-minimap">
            <canvas class="game-card-canvas" id="minimap-${game.gameId}" width="200" height="200"></canvas>
          </div>
        </div>`;
      }
      container.innerHTML = html;

      requestAnimationFrame(() => {
        sorted.forEach(game => {
          if (game.gameState) {
            const canvas = document.getElementById(`minimap-${game.gameId}`);
            if (canvas) {
              canvas.width = canvas.clientWidth;
              canvas.height = canvas.clientHeight;
              const ourIds = (game.controlledSnakes || []).map(s => s.id);
              BoardRenderer.renderMinimap(canvas, game.gameState, ourIds);
            }
          }
        });
      });
    }

    function openGame(gameId) {
      window.location.href = `/play/${gameId}`;
    }

    connectWebSocket();
  </script>
</body>
</html>
